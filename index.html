<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shams Online | Moda Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Josefin+Sans:wght@100;200;300;400;600;700&display=swap"
    rel="stylesheet">

  <style>
    body {
      font-family: 'Josefin Sans', 'Inter', sans-serif;
      background-color: #ffffff;
      color: #000000;
      overflow-x: hidden;
    }

    .font-heading {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 700 !important;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .glass {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    .neo-glow {
      box-shadow: 0 4px 25px rgba(0, 0, 0, 0.06);
    }

    .hover-glow:hover {
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      border-color: rgba(0, 0, 0, 0.3);
    }

    .bg-vibrant-gradient {
      background: linear-gradient(135deg, #000000 0%, #333333 100%);
    }

    .text-vibrant {
      background: linear-gradient(135deg, #000000 0%, #555555 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #f5f5f5;
    }

    ::-webkit-scrollbar-thumb {
      background: #cccccc;
      border-radius: 10px;
    }

    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .animate-marquee {
      display: flex;
      width: 200%;
      animation: marquee 30s linear infinite;
    }

    .filter-btn-active {
      background: #000000;
      border-color: #000000;
      color: #ffffff;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
      transform: translateY(-1px);
    }

    @keyframes pulse-border {
      0%   { box-shadow: 0 0 0 0 rgba(0, 0, 0, 0.3); }
      70%  { box-shadow: 0 0 0 10px rgba(0, 0, 0, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 0, 0, 0); }
    }

    .animate-pulse-glow {
      animation: pulse-border 2s infinite;
    }

    @keyframes pulse-gentle {
      0%   { transform: scale(1); box-shadow: 0 0 10px rgba(0,0,0,0.06); }
      50%  { transform: scale(1.02); box-shadow: 0 0 20px rgba(0,0,0,0.1); }
      100% { transform: scale(1); box-shadow: 0 0 10px rgba(0,0,0,0.06); }
    }

    .animate-pulse-gentle {
      animation: pulse-gentle 3s ease-in-out infinite;
    }

    .premium-glow {
      box-shadow: 0 0 20px rgba(0,0,0,0.08);
      border-color: #e0e0e0 !important;
    }

    .vibrant-border-gradient {
      border: 1px solid #e0e0e0;
    }
  </style>

  <link rel="stylesheet" href="/index.css">

  <!-- Google Analytics GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KFYN1MD2M5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-KFYN1MD2M5');
  </script>
</head>

<body>
  <div id="root">
    <div
      style="background-color: #ffffff; color: #000000; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; flex-direction: column;">
      <h2 style="color: #000000; font-size: 14px; font-weight: 900; letter-spacing: 0.4em; text-transform: uppercase;">SHAMS</h2>
      <p id="loading-status" style="margin-top: 10px; color: #999; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;">Cargando...</p>
      <div id="error-display"
        style="display: none; color: #ff4444; margin-top: 20px; max-width: 80%; text-align: center;"></div>
    </div>
  </div>
  <script>
    window.onerror = function (message, source, lineno, colno, error) {
      document.getElementById('loading-status').style.display = 'none';
      const errorDisplay = document.getElementById('error-display');
      errorDisplay.style.display = 'block';
      errorDisplay.innerHTML = '<strong>Error Crítico:</strong><br>' + message +
        '<br><small>' + source + ':' + lineno + '</small>';
    };
    window.addEventListener('unhandledrejection', function (event) {
      document.getElementById('loading-status').style.display = 'none';
      const errorDisplay = document.getElementById('error-display');
      errorDisplay.style.display = 'block';
      errorDisplay.innerHTML = '<strong>Promesa Rechazada:</strong><br>' + event.reason;
    });
  </script>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
